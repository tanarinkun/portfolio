<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>田中 凛 | Rin Tanaka Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@200;400;600&family=Inter:wght@200;400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* --- デザイントークン (既存維持) --- */
        :root {
            --color-bg: #050505;
            --color-bg-layer: #0c0c0c;
            --color-gold: #c5a059;
            --color-ivory: #f2f2f2;
            --color-text-dim: #999999;
            --font-serif: "Noto Serif JP", serif;
            --font-accent: "Cinzel", serif;
            --font-sans: "Inter", "Hiragino Sans", sans-serif;
            --ease-luxury: cubic-bezier(0.22, 1, 0.36, 1);
            --header-h: 80px;
        }

        /* --- 基本レイアウト --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; scroll-snap-type: y mandatory; }
        body {
            background-color: var(--color-bg);
            color: var(--color-ivory);
            font-family: var(--font-serif);
            line-height: 1.8;
            letter-spacing: 0.1em;
            overflow-x: hidden;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        body.loaded { opacity: 1; }

        .screen {
            height: 100vh; width: 100%;
            scroll-snap-align: start; scroll-snap-stop: always;
            position: relative; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* --- Header --- */
        .header {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-h);
            z-index: 1000; display: flex; align-items: center; padding: 0 40px;
            transition: all 0.6s var(--ease-luxury);
        }
        .header.scrolled {
            height: 65px; background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(197, 160, 89, 0.1);
        }
        .header-inner { width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .logo { text-decoration: none; color: #fff; display: flex; flex-direction: column; }
        .logo-name { font-size: 1.2rem; font-weight: 600; letter-spacing: 0.4em; line-height: 1.2; }
        .logo-sub { font-family: var(--font-accent); font-size: 0.5rem; color: var(--color-gold); letter-spacing: 0.5em; margin-top: 4px; }

        .nav-list { display: flex; list-style: none; gap: 30px; }
        .nav-link { 
            text-decoration: none; color: #fff; font-size: 0.7rem; font-family: var(--font-sans);
            letter-spacing: 0.2em; opacity: 0.35; transition: 0.4s; text-transform: uppercase;
        }
        .nav-link.active { opacity: 1; color: var(--color-gold); }

        /* --- Hero --- */
        .hero-slider { position: absolute; inset: 0; z-index: 1; }
        .hero-slider img {
            position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
            opacity: 0; transform: scale(1.1); transition: opacity 3s ease, transform 15s linear;
        }
        .hero-slider img.active { opacity: 0.4; transform: scale(1.0); }
        .hero-overlay { position: absolute; inset: 0; background: radial-gradient(circle, transparent 20%, #000 150%); z-index: 2; }
        
        .hero-content { position: relative; z-index: 3; text-align: center; }
        .hero-label { font-family: var(--font-sans); font-size: 0.6rem; color: var(--color-gold); letter-spacing: 0.8em; margin-bottom: 20px; display: block; opacity: 0.8; }
        .hero-title { font-size: clamp(1.5rem, 6vw, 2.8rem); font-weight: 200; letter-spacing: 0.5em; line-height: 1.8; margin-bottom: 30px; }
        
        /* Instagram導線（Hero） */
        .hero-sns { display: flex; justify-content: center; gap: 20px; opacity: 0.6; transition: 0.4s; }
        .hero-sns:hover { opacity: 1; }
        .hero-sns a { color: var(--color-ivory); text-decoration: none; font-size: 0.7rem; letter-spacing: 0.2em; display: flex; align-items: center; gap: 8px; }

        /* Gallery Layout (2カラム) */
        .gallery-container {
            width: 100%; max-width: 1300px; padding: 0 40px;
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 60px; align-items: center;
        }
        .gallery-item { display: flex; flex-direction: column; gap: 20px; position: relative; }
        .item-visual { 
            position: relative; overflow: hidden; background: #000; 
            cursor: pointer; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .item-visual img { width: 100%; display: block; transition: 1.5s var(--ease-luxury); filter: brightness(0.8); }
        .item-visual:hover img { transform: scale(1.05); filter: brightness(1); }
        
        .item-info { padding: 0 5px; }
        .item-num { font-family: var(--font-accent); color: var(--color-gold); font-size: 0.6rem; margin-bottom: 5px; display: block; opacity: 0.6; }
        .item-name { font-size: 1.1rem; font-weight: 400; letter-spacing: 0.15em; margin-bottom: 8px; }
        .item-desc { font-size: 0.75rem; color: var(--color-text-dim); font-weight: 200; line-height: 1.8; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Modal */
        .modal {
            position: fixed; inset: 0; background: rgba(5,5,5,0.98); z-index: 2000;
            display: flex; opacity: 0; pointer-events: none; transition: 0.6s var(--ease-luxury);
        }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-inner { 
            position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 40px; cursor: zoom-out;
        }
        .modal-img { 
            max-width: 90%; max-height: 70vh; object-fit: contain; 
            transform: scale(0.95); transition: 0.8s var(--ease-luxury); 
        }
        .modal.active .modal-img { transform: scale(1); }
        
        .modal-info { text-align: center; margin-top: 30px; max-width: 600px; pointer-events: none; }
        .modal-title { font-size: 1.2rem; letter-spacing: 0.2em; margin-bottom: 15px; }
        .modal-desc { font-size: 0.85rem; color: var(--color-text-dim); margin-bottom: 20px; font-weight: 200; line-height: 2; }
        .modal-exif { font-family: var(--font-sans); font-size: 0.55rem; color: var(--color-gold); letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.5; }

        /* 固定Instagramボタン */
        .insta-fixed {
            position: fixed; bottom: 30px; right: 30px; z-index: 900;
            width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            color: var(--color-gold); border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 50%; text-decoration: none; transition: 0.4s;
            background: rgba(5, 5, 5, 0.5); backdrop-filter: blur(5px);
        }
        .insta-fixed:hover { border-color: var(--color-gold); transform: translateY(-5px); background: var(--color-bg-layer); }

        /* Profile / Vision */
        .profile-card { max-width: 800px; text-align: center; padding: 0 40px; }
        .profile-vision { font-size: 1.1rem; margin: 40px 0; line-height: 2.8; font-weight: 200; }
        .profile-meta { display: flex; justify-content: center; gap: 60px; margin-top: 50px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 40px; }
        .meta-item dt { font-size: 0.6rem; color: var(--color-gold); letter-spacing: 0.3em; margin-bottom: 10px; text-transform: uppercase; }
        .meta-item dd { font-size: 1rem; font-weight: 200; }

        /* Contact */
        .contact-box { width: 90%; max-width: 600px; background: var(--color-bg-layer); padding: 60px 40px; border: 1px solid rgba(197, 160, 89, 0.1); }
        .btn-luxury { 
            width: 100%; padding: 20px; border: 1px solid var(--color-gold); background: transparent; 
            color: var(--color-gold); cursor: pointer; transition: 0.5s; letter-spacing: 0.4em; font-family: var(--font-sans); font-size: 0.7rem;
        }
        .btn-luxury:hover { background: var(--color-gold); color: #000; }

        /* Animation */
        .reveal { opacity: 0; transform: translateY(30px); transition: 1.5s var(--ease-luxury); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* Responsive */
        @media screen and (max-width: 768px) {
            .gallery-container { grid-template-columns: 1fr; gap: 40px; padding: 0 30px; }
            .item-visual { max-width: 90%; margin: 0 auto; }
            .header { padding: 0 20px; }
            .nav-list { gap: 15px; }
            .insta-fixed { bottom: 20px; right: 20px; width: 40px; height: 40px; }
        }
    </style>
</head>
<body>

    <a href="https://www.instagram.com/rin_tanaka23" target="_blank" class="insta-fixed" aria-label="Instagram">
        <i data-lucide="instagram" size="18"></i>
    </a>

    <header class="header" id="mainHeader">
        <div class="header-inner">
            <a href="#home" class="logo">
                <span class="logo-name">田中 凛</span>
                <span class="logo-sub">PHOTOGRAPHY PORTFOLIO</span>
            </a>
            <nav>
                <ul class="nav-list">
                    <li><a href="#gallery-0" class="nav-link" data-section="gallery">Gallery</a></li>
                    <li><a href="#vision" class="nav-link" data-section="vision">Vision</a></li>
                    <li><a href="#contact" class="nav-link" data-section="contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="home" class="screen" data-section="home">
            <div class="hero-slider" id="heroSlider"></div>
            <div class="hero-overlay"></div>
            <div class="hero-content reveal">
                <span class="hero-label">VISUAL ARCHIVE</span>
                <h1 class="hero-title">静寂を、<br>編む。</h1>
                <div class="hero-sns">
                    <a href="https://www.instagram.com/rin_tanaka23" target="_blank">
                        <i data-lucide="instagram" size="14"></i> INSTAGRAM
                    </a>
                </div>
            </div>
        </section>

        <div id="gallery-root"></div>

        <section id="vision" class="screen" data-section="vision">
            <div class="profile-card reveal">
                <p class="logo-sub" style="margin-bottom: 15px;">Concept</p>
                <h2 style="font-size: 1.8rem; font-weight: 200; letter-spacing: 0.4em;">日常の断片</h2>
                <div class="profile-vision">
                    <p>通り過ぎてしまう光、<br>名前のない時間。</p>
                    <p style="color: var(--color-text-dim); font-size: 0.85rem; max-width: 500px; margin: 20px auto 0;">
                        目に見えるもの以上の空気感を、<br>一枚の静止画の中に閉じ込める。
                    </p>
                </div>
                <dl class="profile-meta">
                    <div class="meta-item"><dt>Artist</dt><dd>Rin Tanaka</dd></div>
                    <div class="meta-item"><dt>Location</dt><dd>Tokyo / Chiba</dd></div>
                    <div class="meta-item"><dt>Camera</dt><dd>Nikon Z Series</dd></div>
                </dl>
            </div>
        </section>

        <section id="contact" class="screen" data-section="contact">
            <div class="contact-box reveal">
                <h3 style="text-align: center; font-size: 1.2rem; margin-bottom: 40px; font-weight: 200; letter-spacing: 0.3em;">CONTACT</h3>
                <form action="https://formspree.io/f/maqplpnr" method="POST">
                    <div style="margin-bottom:25px;">
                        <input type="text" name="name" placeholder="NAME" class="btn-luxury" style="text-align:left; border:none; border-bottom:1px solid #333; padding:10px 0; background:transparent; color:#fff; border-radius:0;" required>
                    </div>
                    <div style="margin-bottom:25px;">
                        <input type="email" name="email" placeholder="EMAIL" class="btn-luxury" style="text-align:left; border:none; border-bottom:1px solid #333; padding:10px 0; background:transparent; color:#fff; border-radius:0;" required>
                    </div>
                    <div style="margin-bottom:40px;">
                        <textarea name="message" placeholder="MESSAGE" rows="3" class="btn-luxury" style="text-align:left; border:none; border-bottom:1px solid #333; padding:10px 0; background:transparent; color:#fff; border-radius:0; resize:none;" required></textarea>
                    </div>
                    <button type="submit" class="btn-luxury">SEND INQUIRY</button>
                </form>
                <p style="text-align: center; margin-top: 30px; font-size: 0.6rem; opacity: 0.4;">
                    OR DM VIA <a href="https://www.instagram.com/rin_tanaka23" target="_blank" style="color: var(--color-gold); text-decoration: none;">INSTAGRAM</a>
                </p>
            </div>
        </section>
    </main>

    <div class="modal" id="galleryModal">
        <div class="modal-inner" id="modalOverlay">
            <img src="" alt="" class="modal-img" id="modalImg">
            <div class="modal-info">
                <h4 class="modal-title" id="modalTitle"></h4>
                <p class="modal-desc" id="modalDesc"></p>
                <p class="modal-exif" id="modalExif"></p>
            </div>
        </div>
    </div>

    <script>
        // --- DATA_CONFIG: 既存＋新規の全写真リスト ---
        const DATA_CONFIG = {
            heroImages: ["001_1923.jpg", "001_2232.jpg", "001_2199.jpg"],
            photos: [
                { src: "001_3622.jpg", name: "対話のほとり", desc: "水面に映る緑と、寄り添う白い影。静かな時間が流れる場所。", exif: "f/4.5 | 1/200s | ISO 400" },
                { src: "001_3603.jpg", name: "木漏れ日の記憶", desc: "苔むした石を撫でる光。森が呼吸する一瞬を切り取る。", exif: "f/2.8 | 1/500s | ISO 100" },
                { src: "001_3556.jpg", name: "燃ゆる影", desc: "重なり合う楓の葉。色彩の層が空気を重厚に染め上げる。", exif: "f/5.6 | 1/125s | ISO 200" },
                { src: "001_3547.jpg", name: "一輪の呼吸", desc: "鮮やかな紅が、淡い背景に浮き立つ。生命の輪郭。", exif: "f/1.8 | 1/1000s | ISO 100" },
                { src: "001_3467.jpg", name: "時の澱み", desc: "水草の中に佇む古い設備。自然と人工物が溶け合う瞬間。", exif: "f/8.0 | 1/60s | ISO 800" },
                { src: "001_3535.jpg", name: "標本の世界", desc: "静止した時間の中に閉じ込められた、自然の造形美。", exif: "f/4.0 | 1/160s | ISO 200" },
                { src: "001_2232.jpg", name: "境界の静寂", desc: "光と影が交差する、日常の中の非日常的な空間。", exif: "f/2.8 | 1/100s | ISO 400" },
                { src: "001_2199.jpg", name: "都市の脈動", desc: "無機質な構造物が見せる、一瞬の有機的な表情。", exif: "f/5.6 | 1/250s | ISO 100" },
                { src: "001_1943.jpg", name: "移ろい", desc: "季節が通り過ぎる瞬間の、淡い色彩の記憶。", exif: "f/2.0 | 1/800s | ISO 100" },
                { src: "001_1923.jpg", name: "光の粒子", desc: "空気に溶け込むような、柔らかな午後の光を捉えて。", exif: "f/1.8 | 1/2000s | ISO 100" },
                { src: "001_1887.jpg", name: "静かなる断片", desc: "足元に転がる、誰にも気づかれない美しさ。", exif: "f/4.0 | 1/60s | ISO 800" },
                { src: "001_1007.jpg", name: "原風景", desc: "記憶の奥底に眠る、懐かしくも新しい景色。", exif: "f/8.0 | 1/125s | ISO 200" }
            ]
        };

        // --- ギャラリー生成ロジック ---
        function initGallery() {
            const root = document.getElementById('gallery-root');
            const photos = DATA_CONFIG.photos;
            
            for (let i = 0; i < photos.length; i += 2) {
                const pair = photos.slice(i, i + 2);
                const screenId = `gallery-${Math.floor(i/2)}`;
                
                let pairHTML = '';
                pair.forEach((photo, idx) => {
                    const globalIdx = i + idx;
                    pairHTML += `
                        <div class="gallery-item">
                            <div class="item-visual reveal" onclick="openModal(${globalIdx})">
                                <img src="${photo.src}" alt="${photo.name}" loading="lazy">
                            </div>
                            <div class="item-info reveal">
                                <span class="item-num">#${(globalIdx + 1).toString().padStart(3, '0')}</span>
                                <h3 class="item-name">${photo.name}</h3>
                                <p class="item-desc">${photo.desc}</p>
                            </div>
                        </div>
                    `;
                });

                root.innerHTML += `
                    <section id="${screenId}" class="screen" data-section="gallery">
                        <div class="gallery-container">${pairHTML}</div>
                    </section>
                `;
            }
        }

        // --- Modal Control ---
        const modal = document.getElementById('galleryModal');
        function openModal(idx) {
            const data = DATA_CONFIG.photos[idx];
            document.getElementById('modalImg').src = data.src;
            document.getElementById('modalTitle').textContent = data.name;
            document.getElementById('modalDesc').textContent = data.desc;
            document.getElementById('modalExif').textContent = data.exif;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        document.getElementById('modalOverlay').addEventListener('click', () => {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        });

        // --- Observer ---
        function initObserver() {
            const navLinks = document.querySelectorAll('.nav-link');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
                        const section = entry.target.getAttribute('data-section');
                        navLinks.forEach(link => {
                            link.classList.toggle('active', link.getAttribute('data-section') === section);
                        });
                        document.getElementById('mainHeader').classList.toggle('scrolled', window.scrollY > 100);
                    }
                });
            }, { threshold: 0.3 });
            document.querySelectorAll('section').forEach(sec => observer.observe(sec));
        }

        // --- Initialize ---
        window.addEventListener('DOMContentLoaded', () => {
            const slider = document.getElementById('heroSlider');
            DATA_CONFIG.heroImages.forEach((src, i) => {
                const img = document.createElement('img');
                img.src = src;
                if(i===0) img.classList.add('active');
                slider.appendChild(img);
            });

            initGallery();
            initObserver();
            lucide.createIcons();

            setTimeout(() => { document.body.classList.add('loaded'); }, 100);
        });

        // Hero Slider Loop
        let currentHero = 0;
        setInterval(() => {
            const imgs = document.querySelectorAll('.hero-slider img');
            if(imgs.length > 0) {
                imgs[currentHero].classList.remove('active');
                currentHero = (currentHero + 1) % imgs.length;
                imgs[currentHero].classList.add('active');
            }
        }, 6000);
    </script>
</body>
</html>
