<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIN | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Serif+JP:wght@200;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 修正箇所: デザイントークンの再定義 --- */
        :root {
            --font-en: 'Playfair Display', serif;
            --font-jp: 'Noto Serif JP', serif;
            --bg-color: #0d0d0d;
            --text-color: #f5f5f5;
            --accent-color: #FFE000;
            --spacing-lg: 160px; /* 余白を従来の2倍に拡張 */
            --spacing-md: 60px;
            --transition: cubic-bezier(0.2, 1, 0.3, 1);
        }

        /* --- 全体フォントとベースの統一 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-jp);
            line-height: 2.2; /* 行間を広げて高級感を演出 */
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- 修正箇所: ヘッダーデザインの昇華 --- */
        header.global-header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 40px 60px;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(13,13,13,0.9), transparent);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .logo {
            display: flex;
            flex-direction: column;
            text-decoration: none;
        }

        .main-title {
            font-family: var(--font-en);
            font-size: 2.8rem; /* サイズアップ */
            letter-spacing: 0.4em;
            color: var(--accent-color);
            line-height: 1;
            font-weight: 400;
        }

        .sub-copy {
            font-family: var(--font-en);
            font-size: 0.75rem;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            color: var(--text-color);
            opacity: 0.4; /* 薄く表示 */
            margin-top: 12px;
        }

        /* --- 修正箇所: セクション間の広大な余白 --- */
        .screen {
            min-height: 100vh;
            padding: var(--spacing-lg) 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1.5s var(--transition), transform 1.5s var(--transition);
        }

        .screen.active {
            opacity: 1;
            transform: translateY(0);
        }

        .section-container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* --- 修正箇所: ボタン（右寄せ・細枠・反転） --- */
        .action-area {
            display: flex;
            justify-content: flex-end; /* 右寄せ */
            margin-top: var(--spacing-md);
        }

        .btn-outline {
            display: inline-block;
            padding: 18px 60px;
            border: 1px solid rgba(245, 245, 245, 0.5); /* 細枠 */
            color: var(--text-color);
            text-decoration: none;
            font-family: var(--font-en);
            font-size: 0.8rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            transition: all 0.6s var(--transition);
            background: transparent;
        }

        .btn-outline:hover {
            background-color: var(--text-color);
            color: var(--bg-color); /* 色反転 */
            border-color: var(--text-color);
        }

        /* ヒーローテキスト */
        .hero-text {
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            font-weight: 200;
            letter-spacing: 0.3em;
            line-height: 2.5;
            margin-bottom: 40px;
        }

        /* ギャラリープレースホルダー */
        #gallery-root {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .placeholder-img {
            width: 100%;
            aspect-ratio: 1/1;
            background: #1a1a1a;
            transition: 0.8s var(--transition);
        }

        /* スマホ最適化 */
        @media (max-width: 768px) {
            header.global-header { padding: 30px 25px; }
            .main-title { font-size: 2rem; }
            .screen { padding: 100px 25px; }
            .hero-text { line-height: 2.2; }
            .btn-outline { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <header class="global-header">
        <a href="#home" class="logo">
            <span class="main-title">RIN</span>
            <span class="sub-copy">Photographic Moments</span>
        </a>
    </header>

    <main id="app">
        <section id="home" class="screen active">
            <div class="section-container">
                <h2 class="hero-text">静寂の中にある、<br>一瞬の美を掬い上げる</h2>
                <div class="action-area">
                    <a href="#pictures-section" class="btn-outline">View Gallery</a>
                </div>
            </div>
        </section>

        <section id="pictures-section" class="screen">
            <div class="section-container">
                <div style="margin-bottom: 60px;">
                    <h3 style="font-family: var(--font-en); font-size: 2.5rem; letter-spacing: 0.2em; font-weight: 400;">PICTURES</h3>
                    <p style="opacity: 0.4; font-style: italic; font-family: var(--font-en);">Selected Works</p>
                </div>
                
                <div id="gallery-root">
                    <div class="placeholder-img"><img src="001_2232.jpg" style="width:100%; height:100%; object-fit:cover;" alt=""></div>
                    <div class="placeholder-img"><img src="001_1923.jpg" style="width:100%; height:100%; object-fit:cover;" alt=""></div>
                    <div class="placeholder-img"><img src="001_1007.jpg" style="width:100%; height:100%; object-fit:cover;" alt=""></div>
                    <div class="placeholder-img"><img src="001_1887.jpg" style="width:100%; height:100%; object-fit:cover;" alt=""></div>
                </div>

                <div class="action-area">
                    <a href="#profile" class="btn-outline">About Me</a>
                </div>
            </div>
        </section>

        <section id="profile" class="screen">
            <div class="section-container">
                <h2 style="font-family: var(--font-en); font-size: 2.5rem; margin-bottom: 40px;">PROFILE</h2>
                <p style="max-width: 600px; margin-bottom: 40px;">
                    日常の中に潜む、光と影の境界線を記録しています。<br>
                    19歳の視点が捉える、言葉にならない感情のポートフォリオ。
                </p>
                <div class="action-area">
                    <a href="#contact" class="btn-outline">Contact</a>
                </div>
            </div>
        </section>
    </main>

    <script>
        /**
         * 修正箇所: state 中心管理ロジックの継承
         */
        const state = {
            currentScreen: 'home'
        };

        // 画面遷移・アニメーションの監視
        const observerOptions = {
            threshold: 0.2
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    state.currentScreen = entry.target.id;
                }
            });
        }, observerOptions);

        document.querySelectorAll('.screen').forEach(screen => {
            observer.observe(screen);
        });

        // ボタンのスムーズスクロール
        document.querySelectorAll('.btn-outline').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const targetId = btn.getAttribute('href');
                if(targetId.startsWith('#')) {
                    e.preventDefault();
                    document.querySelector(targetId).scrollIntoView({
                        behavior: 'smooth'
                    });
                }
            });
        });

        /**
         * Firebase等の初期化が必要な場合はここに追加
         * console.log("System Ready.");
         */
    </script>
</body>
</html>
