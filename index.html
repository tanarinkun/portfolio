<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rin Portfolio | Photographer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. 基本設定 & 質感 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Noto Serif JP', serif;
            background: #0d0d0d;
            color: #f5f5f5;
            line-height: 1.8;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* フィルム質感（変更なし） */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.03;
            pointer-events: none;
            z-index: 9999;
        }

        /* --- 2. ヘッダー --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 40px;
            background: rgba(13, 13, 13, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 1000;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #FFE000;
            text-decoration: none;
            position: relative;
        }

        /* ロゴの下線（前回の修正を維持） */
        .logo::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -6px;
            width: 100%;
            height: 3px;
            background: #fff;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        nav { display: flex; gap: 28px; }
        nav a {
            text-decoration: none;
            color: #f5f5f5;
            font-family: 'Playfair Display', serif;
            font-size: 11px;
            letter-spacing: 0.2em;
            opacity: 0.6; 
            transition: 0.4s;
            padding-bottom: 4px;
        }
        nav a.active { opacity: 1; border-bottom: 1px solid rgba(255, 255, 255, 0.4); }

        /* --- 3. ホーム：超スムーズなスライドショー --- */
        #home {
            position: relative;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000; /* 背景は黒に固定 */
        }

        .slideshow-container {
            position: absolute;
            inset: 0;
            z-index: 1; /* コンテンツより下 */
        }

        .slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0; /* 初期状態は非表示 */
            
            /* 【重要】フェード時間を少し長く、ease-in-outで滑らかに */
            transition: opacity 2.5s ease-in-out; 
            
            /* 初期状態で少しズームアウトしておく */
            transform: scale(1.1); 
        }

        /* 現在前面に表示されている画像 */
        .slide.active {
            opacity: 0.5; /* 文字を読ませるための暗さ */
            z-index: 3; /* 一番上 */
            
            /* 【重要】KenBurnsアニメーション（ズームイン） */
            animation: kenBurnsSmooth 10s ease-out forwards;
        }

        /* 次に表示される（または直前に表示されていた）画像 */
        .slide.next {
            opacity: 0.5; /* 次の画像も暗くしておく */
            z-index: 2; /* activeのすぐ下 */
            transform: scale(1.0); /* ズームインが完了した状態 */
        }

        /* 非常に滑らかでゆっくりとしたKen Burns */
        @keyframes kenBurnsSmooth {
            from { transform: scale(1.1); }
            to { transform: scale(1.0); }
        }

        .home-content { text-align: center; z-index: 10; pointer-events: none; }
        .home-catch {
            font-size: clamp(1.4rem, 5vw, 2.2rem);
            letter-spacing: 0.3em;
            line-height: 2.4;
            font-weight: 300;
            margin-bottom: 25px;
        }

        /* --- 4. 共通アニメーション --- */
        section {
            min-height: 100vh;
            padding: 120px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.2s ease; /* 少しゆっくりに調整 */
        }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* --- 5. ギャラリー --- */
        #pictures {
            height: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); /* 自動調整に変更 */
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .photo {
            position: relative;
            overflow: hidden;
            aspect-ratio: 1 / 1; /* 正方形に統一（高級感） */
            background: #1a1a1a;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.8s ease;
        }
        .photo.reveal-photo { opacity: 1; transform: translateY(0); }

        .photo img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .photo:hover img { transform: scale(1.05); }

        /* --- 6. モーダルビューワー --- */
        #viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; justify-content: center; align-items: center; z-index: 2000; cursor: zoom-out; }
        #viewer img { max-width: 90%; max-height: 85vh; object-fit: contain; animation: zoomIn 0.4s ease; }
        
        #exifData {
            position: absolute; bottom: 20px; right: 20px;
            font-family: 'Playfair Display', serif; font-size: 10px;
            color: #f5f5f5; opacity: 0.4; pointer-events: none;
        }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        @media (max-width: 768px) {
            header { padding: 15px 20px; }
            #pictures { grid-template-columns: 1fr 1fr; gap: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#home" class="logo">RIN</a>
        <nav id="nav">
            <a href="#home" class="active">HOME</a>
            <a href="#pictures">PICTURE</a>
            <a href="#profile">PROFILE</a>
            <a href="#contact">CONTACT</a>
        </nav>
    </header>

    <main>
        <section id="home">
            <div class="slideshow-container">
                <div class="slide active" style="background-image: url('001_2232.jpg');"></div>
                <div class="slide" style="background-image: url('001_1923.jpg');"></div>
                <div class="slide" style="background-image: url('001_1007.jpg');"></div>
                <div class="slide" style="background-image: url('001_1887.jpg');"></div>
            </div>
            <div class="home-content">
                <div class="home-catch reveal">静寂の中にある、<br>一瞬の美を掬い上げる</div>
                <div class="home-sub reveal">Photographer / Rin Tanaka</div>
            </div>
        </section>

        <section id="pictures-section">
            <div id="pictures">
                <div class="photo reveal-photo" data-exif="Nikon Z 50II | f/5.0 | 1/200s | ISO 400"><img src="001_2232.jpg" alt="Silence"></div>
                <div class="photo reveal-photo" data-exif="Nikon Z 50II | f/4.0 | 1/160s | ISO 800"><img src="001_1923.jpg" alt="Structure"></div>
                <div class="photo reveal-photo" data-exif="Nikon Z 50II | f/2.8 | 1/60s | ISO 640"><img src="001_1007.jpg" alt="Toys"></div>
                <div class="photo reveal-photo" data-exif="Nikon Z 50II | f/5.6 | 1/1000s | ISO 100"><img src="001_1887.jpg" alt="Park"></div>
            </div>
        </section>

        <section id="profile">
            <h2 class="profile-name reveal">田中 凛 / 19</h2>
            <div class="profile-text reveal">日常の中にある、静けさや余韻を大切にしています。</div>
        </section>

        <section id="contact">
            <a href="mailto:rin.tk.uni@gmail.com" class="email reveal">rin.tk.uni@gmail.com</a>
        </section>
    </main>

    <div id="viewer" aria-hidden="true">
        <img id="viewerImg" src="" alt="Zoomed view">
        <div id="exifData"></div>
    </div>

    <script>
        /**
         * 1. 【超重要】シームレス・スライドショー制御ロジック
         */
        const slides = document.querySelectorAll('.slide');
        let currentIdx = 0;
        const fadeTime = 2500; // CSSのtransition時間 (ms)
        const displayTime = 5000; // 画像が静止して見えている時間 (ms)

        function showNextSlide() {
            // 1. 現在の画像を特定
            const currentSlide = slides[currentIdx];
            
            // 2. 次の画像のインデックスを計算
            currentIdx = (currentIdx + 1) % slides.length;
            const nextSlide = slides[currentIdx];

            // 3. 次の画像を「準備」状態にする（z-index:2, opacity:0.5）
            slides.forEach(s => s.classList.remove('next')); // 他のnextをクリア
            nextSlide.classList.add('next');

            // 4. 現在の画像（前面）をフェードアウトさせる
            currentSlide.classList.remove('active');

            // 5. 次の画像を前面に持ってくる (z-index:3)
            // フェードアウトが完了する少し前にactiveを付けることで、
            // 完全に重なり合いながら切り替わる。
            setTimeout(() => {
                nextSlide.classList.add('active');
            }, 100); // わずかな遅延で重ねる
        }

        // 最初のタイマー設定
        setInterval(showNextSlide, fadeTime + displayTime);


        /**
         * 2. スクロールアニメーション (Observer) - 少し調整
         */
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

        const photoObserver = new IntersectionObserver((entries) => {
            entries.forEach((entry, i) => {
                if (entry.isIntersecting) {
                    setTimeout(() => entry.target.classList.add('reveal-photo'), i * 80); // 少し早める
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.photo').forEach(p => photoObserver.observe(p));


        /**
         * 3. モーダルビューワーの制御 (変更なし)
         */
        const viewer = document.getElementById('viewer');
        const viewerImg = document.getElementById('viewerImg');
        const exifArea = document.getElementById('exifData');

        document.querySelectorAll('.photo').forEach(container => {
            const img = container.querySelector('img');
            const exifData = container.getAttribute('data-exif');

            container.addEventListener('click', () => {
                viewer.style.display = 'flex';
                viewerImg.src = img.src;
                exifArea.textContent = exifData;
                document.documentElement.style.overflow = 'hidden';
                viewer.setAttribute('aria-hidden', 'false');
            });
        });

        const closeViewer = () => {
            viewer.style.display = 'none';
            document.documentElement.style.overflow = '';
            viewer.setAttribute('aria-hidden', 'true');
            viewerImg.src = ''; 
            exifArea.textContent = '';
        };

        viewer.addEventListener('click', closeViewer);
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && viewer.style.display === 'flex') closeViewer(); });


        /**
         * 4. カレントナビ（変更なし）
         */
        const navLinks = document.querySelectorAll('nav a');
        const sections = document.querySelectorAll('section, #pictures-section');

        window.addEventListener('scroll', () => {
            let current = "";
            sections.forEach(section => {
                if (pageYOffset >= (section.offsetTop - 400)) current = section.getAttribute('id');
            });
            navLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href').includes(current)) link.classList.add('active');
            });
        });
    </script>
</body>
</html>
