<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <title>田中 凛 | 写真作品集 - 刻まれる光、静寂の淵</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@200;400;600&family=Inter:wght@200;400&display=swap" rel="stylesheet">

    <style>
        /* --- デザイントークン --- */
        :root {
            --color-bg: #050505;
            --color-bg-layer: #0c0c0c;
            --color-gold: #c5a059;
            --color-ivory: #f2f2f2;
            --color-text-dim: #999999;
            --font-serif: "Noto Serif JP", serif;
            --font-accent: "Cinzel", serif;
            --font-sans: "Inter", sans-serif;
            --ease-luxury: cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* --- 全体レイアウト & スクロールスナップ --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html { 
            scroll-behavior: smooth;
            scroll-snap-type: y mandatory;
        }
        
        body {
            background-color: var(--color-bg);
            color: var(--color-ivory);
            font-family: var(--font-serif);
            line-height: 1.8;
            letter-spacing: 0.1em;
            overflow-x: hidden;
        }

        .screen {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- ヘッダー --- */
        .header {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 80px;
            z-index: 1000;
            display: flex; align-items: center;
            padding: 0 40px;
            transition: 0.6s var(--ease-luxury);
        }
        .header.scrolled {
            height: 60px;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(197, 160, 89, 0.1);
        }
        .header-inner { width: 100%; display: flex; justify-content: space-between; align-items: center; }
        
        .logo { text-decoration: none; color: #fff; line-height: 1.2; }
        .logo-name { font-size: 1.2rem; font-weight: 600; letter-spacing: 0.3em; display: block; }
        .logo-en { font-family: var(--font-accent); font-size: 0.55rem; color: var(--color-gold); letter-spacing: 0.4em; }

        .nav-list { display: flex; list-style: none; gap: 25px; }
        .nav-link { 
            text-decoration: none; color: #fff; font-size: 0.7rem; 
            font-family: var(--font-sans); letter-spacing: 0.2em; opacity: 0.4; transition: 0.4s;
            text-transform: uppercase;
        }
        .nav-link.active { opacity: 1; color: var(--color-gold); }

        /* --- 背景スライド (クロスフェード) --- */
        .hero-slider { position: absolute; inset: 0; z-index: 1; }
        .hero-slider img {
            position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
            opacity: 0; transform: scale(1.1);
            transition: opacity 2.5s ease-in-out, transform 12s linear;
        }
        .hero-slider img.active { opacity: 0.45; transform: scale(1.0); z-index: 2; }
        .hero-overlay { position: absolute; inset: 0; background: radial-gradient(circle, transparent 20%, #000 140%); z-index: 3; }
        .hero-content { position: relative; z-index: 4; text-align: center; }
        .hero-title { font-size: clamp(1.8rem, 8vw, 3.5rem); font-weight: 200; letter-spacing: 0.4em; line-height: 1.6; margin-bottom: 20px; }

        /* --- お知らせセクション (Owner Only 管理) --- */
        .news-container {
            width: 90%; max-width: 800px;
            background: var(--color-bg-layer);
            padding: 40px;
            border: 1px solid rgba(197, 160, 89, 0.1);
        }
        .news-list { list-style: none; }
        .news-item {
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }
        .news-item:last-child { border-bottom: none; }
        .news-date { font-family: var(--font-accent); color: var(--color-gold); font-size: 0.75rem; display: block; margin-bottom: 5px; }
        .news-title { font-size: 1.1rem; font-weight: 400; margin-bottom: 8px; color: var(--color-ivory); }
        .news-text { font-size: 0.85rem; color: var(--color-text-dim); line-height: 1.8; }

        /* --- ギャラリー (レスポンシブ) --- */
        .gallery-container {
            width: 100%; max-width: 1200px; padding: 0 40px;
            display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 60px; align-items: center;
        }
        .item-visual { position: relative; overflow: hidden; background: #000; cursor: pointer; }
        .item-visual img { width: 100%; display: block; transition: 1.5s var(--ease-luxury); filter: brightness(0.8); }
        .item-visual:hover img, .item-visual.touch img { transform: scale(1.05); filter: brightness(1.0); }
        .item-name { font-size: clamp(1.5rem, 4vw, 2.2rem); margin-bottom: 20px; font-weight: 400; }
        .item-desc { font-size: 0.9rem; color: var(--color-text-dim); font-weight: 200; line-height: 2.2; }

        /* --- プロフィール --- */
        .profile-card { max-width: 700px; text-align: center; padding: 0 30px; }
        .profile-vision { font-size: clamp(0.9rem, 3vw, 1.1rem); margin: 30px 0; line-height: 2.5; }
        .profile-meta { display: flex; justify-content: center; gap: 50px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 30px; }
        .meta-item dd { font-size: 1.1rem; font-weight: 200; }

        /* --- コンタクト --- */
        .contact-box { width: 90%; max-width: 600px; background: var(--color-bg-layer); padding: 50px 30px; border: 1px solid rgba(197, 160, 89, 0.1); }
        .form-input { 
            width: 100%; background: transparent; border: none; border-bottom: 1px solid #333; 
            padding: 12px 0; color: #fff; font-family: var(--font-serif); margin-bottom: 25px; transition: 0.4s;
        }
        .form-input:focus { outline: none; border-bottom: 1px solid var(--color-gold); }
        .btn-luxury {
            width: 100%; padding: 18px; border: 1px solid var(--color-gold); background: transparent;
            color: var(--color-gold); cursor: pointer; transition: 0.4s; letter-spacing: 0.3em;
        }
        .btn-luxury:hover { background: var(--color-gold); color: #000; }

        .sns-group { display: flex; justify-content: center; gap: 30px; margin-top: 40px; }
        .sns-link { color: var(--color-text-dim); text-decoration: none; font-size: 0.75rem; transition: 0.3s; }
        .sns-link:hover { color: var(--color-gold); }

        /* --- アニメーション --- */
        .reveal { opacity: 0; transform: translateY(30px); transition: 1.6s var(--ease-luxury); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* モバイル最適化 */
        @media (max-width: 1024px) {
            .gallery-container { grid-template-columns: 1fr; gap: 30px; text-align: center; padding: 0 20px; }
            .header { padding: 0 20px; }
            .profile-meta { flex-direction: column; gap: 20px; }
            .news-container { padding: 25px; }
        }
    </style>
</head>
<body>

    <header class="header" id="mainHeader">
        <div class="header-inner">
            <a href="#home" class="logo">
                <span class="logo-name">田中 凛</span>
                <span class="logo-en">RIN TANAKA GALLERY</span>
            </a>
            <nav>
                <ul class="nav-list">
                    <li><a href="#news" class="nav-link" data-section="news">News</a></li>
                    <li><a href="#gallery-root" class="nav-link" data-section="gallery">Gallery</a></li>
                    <li><a href="#profile" class="nav-link" data-section="profile">Vision</a></li>
                    <li><a href="#contact" class="nav-link" data-section="contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="home" class="screen">
            <div class="hero-slider" id="heroSlider">
                <img src="001_2232.jpg" class="active" alt="">
                <img src="001_1943.jpg" alt="">
            </div>
            <div class="hero-overlay"></div>
            <div class="hero-content reveal">
                <h1 class="hero-title">光を聴き、<br>静寂を刻む。</h1>
                <p style="font-family: var(--font-accent); color: var(--color-gold); letter-spacing: 0.5em;">THE ARCHIVE OF SILENCE</p>
            </div>
        </section>

        <section id="news" class="screen">
            <div class="news-container reveal">
                <h2 style="font-size: 1.5rem; margin-bottom: 30px; text-align: center; letter-spacing: 0.3em; font-weight: 200;">NEWS</h2>
                <div id="news-list-root" class="news-list">
                    </div>
            </div>
        </section>

        <div id="gallery-root"></div>

        <section id="profile" class="screen">
            <div class="profile-card reveal">
                <h2 style="font-size: 2rem; font-weight: 200; letter-spacing: 0.3em; margin-bottom: 20px;">田中 凛</h2>
                <div class="profile-vision">
                    <p>「記録」を越えて、その場の「湿度」を撮りたい。</p>
                    <p style="font-size: 0.9rem; color: var(--color-text-dim); margin-top: 20px;">
                        日常のノイズを削ぎ落とした先にある、本質的な静けさを追求しています。<br>
                        Nikon Z 50IIと共に歩く時間は、世界との対話そのものです。
                    </p>
                </div>
                <dl class="profile-meta">
                    <div class="meta-item">
                        <dt style="color: var(--color-gold); font-size: 0.6rem;">GEAR</dt>
                        <dd>Nikon Z 50II</dd>
                    </div>
                    <div class="meta-item">
                        <dt style="color: var(--color-gold); font-size: 0.6rem;">BASE</dt>
                        <dd>Tokyo / Chiba</dd>
                    </div>
                </dl>
            </div>
        </section>

        <section id="contact" class="screen">
            <div class="contact-box reveal">
                <h3 style="text-align: center; font-size: 1.4rem; margin-bottom: 30px; font-weight: 200;">CONTACT</h3>
                <form action="https://formspree.io/f/maqplpnr" method="POST">
                    <input type="text" name="name" class="form-input" placeholder="NAME" required>
                    <input type="email" name="email" class="form-input" placeholder="EMAIL" required>
                    <textarea name="message" class="form-input" placeholder="MESSAGE" rows="3" required></textarea>
                    <button type="submit" class="btn-luxury">SEND MESSAGE</button>
                </form>
                <div class="sns-group">
                    <a href="https://www.instagram.com/7r11n_/" target="_blank" class="sns-link">INSTAGRAM</a>
                    <a href="https://x.com/cossrin" target="_blank" class="sns-link">X (TWITTER)</a>
                </div>
            </div>
        </section>
    </main>

    <script>
        /* ==========================================
           1. お知らせデータ管理 (ここを増やすだけでOK)
        ========================================== */
        const NEWS_DATA = [
            {
                date: "2026.03.18",
                title: "ポートフォリオサイトをリニューアルしました",
                text: "より作品の世界観を伝えるため、デザインを一新。モバイル体験を大幅に向上させました。"
            },
            {
                date: "2026.03.05",
                title: "新しい機材の購入",
                text: "新しくnikkor z50mm f/1,8sを購入"
            }
        ];

        /* ==========================================
           2. ギャラリーデータ管理 (ここを増やすだけでOK)
        ========================================== */
        const GALLERY_DATA = [
            {
                src: "001_2232.jpg",
                name: "静寂の淵",
                desc: "寺院の回廊に落ちる光は、目に見えない時間の粒子を可視化させます。"
            },
            {
                src: "001_1943.jpg",
                name: "都市の幾何学",
                desc: "無機質な鉄とガラスが交差する瞬間。都会の喧騒の中に現れる均衡。"
            }
        ];

        /* --- 自動生成処理 --- */
        const newsRoot = document.getElementById('news-list-root');
        NEWS_DATA.forEach(item => {
            newsRoot.innerHTML += `
                <div class="news-item">
                    <span class="news-date">${item.date}</span>
                    <h4 class="news-title">${item.title}</h4>
                    <p class="news-text">${item.text}</p>
                </div>
            `;
        });

        const galleryRoot = document.getElementById('gallery-root');
        GALLERY_DATA.forEach((item, index) => {
            galleryRoot.innerHTML += `
                <section class="screen" data-section="gallery">
                    <div class="gallery-container">
                        <div class="item-visual reveal" onclick="this.classList.toggle('touch')">
                            <img src="${item.src}" alt="${item.name}">
                        </div>
                        <div class="item-info reveal">
                            <span style="color:var(--color-gold); font-family:var(--font-accent); font-size:0.7rem;">0${index+1} / ARCHIVE</span>
                            <h3 class="item-name">${item.name}</h3>
                            <p class="item-desc">${item.desc}</p>
                        </div>
                    </div>
                </section>
            `;
        });

        /* ==========================================
           背景スライド & インタラクション制御
        ========================================== */
        const heroSlides = document.querySelectorAll('#heroSlider img');
        let currentSlide = 0;
        setInterval(() => {
            heroSlides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % heroSlides.length;
            heroSlides[currentSlide].classList.add('active');
        }, 5500);

        const header = document.getElementById('mainHeader');
        const navLinks = document.querySelectorAll('.nav-link');
        const sections = document.querySelectorAll('section, .screen');

        window.addEventListener('scroll', () => {
            header.classList.toggle('scrolled', window.scrollY > 50);
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
                    const activeId = entry.target.getAttribute('data-section') || entry.target.id;
                    navLinks.forEach(link => {
                        link.classList.toggle('active', link.getAttribute('data-section') === activeId);
                    });
                }
            });
        }, { threshold: 0.5 });

        sections.forEach(sec => observer.observe(sec));
    </script>
</body>
</html>
