<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>田中 凛 | 写真作品集 - 刻まれる光、静寂の淵</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@200;400;600&family=Inter:wght@200;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-bg: #050505;
            --color-bg-layer: #0c0c0c;
            --color-gold: #c5a059;
            --color-ivory: #f2f2f2;
            --color-text-sub: #909090;
            --serif: "Noto Serif JP", serif;
            --accent: "Cinzel", serif;
            --ease-luxury: cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* 1 & 5. スクロールスナップ設定 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { 
            scroll-behavior: smooth;
            scroll-snap-type: y mandatory; /* セクションごとに固定 */
        }
        body {
            background-color: var(--color-bg);
            color: var(--color-ivory);
            font-family: var(--serif);
            line-height: 2;
            letter-spacing: 0.12em;
        }

        section {
            height: 100vh;
            scroll-snap-align: start; /* スクロール固定位置 */
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 2. ヘッダー固定: スクロールで移動しない */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 60px;
            background: linear-gradient(to bottom, rgba(5,5,5,0.8), transparent);
            pointer-events: none; /* 下のコンテンツの操作を邪魔しない */
        }
        .header-inner { 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            pointer-events: auto; /* ボタン類は反応させる */
        }
        .logo { text-decoration: none; color: #fff; }
        .logo-jp { font-size: 1.3rem; font-weight: 600; letter-spacing: 0.4em; display: block; margin-bottom: 4px; }
        .logo-en { font-family: var(--accent); font-size: 0.6rem; color: var(--color-gold); letter-spacing: 0.5em; }

        .nav-list { display: flex; list-style: none; gap: 40px; }
        .nav-link { 
            text-decoration: none; color: #fff; font-size: 0.7rem; letter-spacing: 0.25em;
            text-transform: uppercase; opacity: 0.5; transition: 0.4s;
        }
        .nav-link:hover { opacity: 1; color: var(--color-gold); }

        /* 1. 背景スライド: クロスフェードの修正 */
        .hero-slider {
            position: absolute;
            inset: 0;
            z-index: 1;
        }
        .hero-slider img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0; /* 最初は非表示 */
            transition: opacity 2s ease-in-out, transform 10s linear;
        }
        .hero-slider img.active {
            opacity: 0.5; /* 暗転を防ぐため、常に1枚は表示 */
            transform: scale(1.1);
            z-index: 2;
        }

        .hero-overlay { position: absolute; inset: 0; background: radial-gradient(circle, transparent 20%, #000 120%); z-index: 3; }
        .hero-content { position: relative; z-index: 4; text-align: center; }
        .hero-title { font-size: clamp(1.8rem, 5vw, 3.5rem); font-weight: 200; line-height: 1.8; margin-bottom: 35px; letter-spacing: 0.45em; }

        /* 4. ギャラリー構造の自動化用CSS */
        .gallery-container {
            width: 100%;
            max-width: 1400px;
            padding: 0 60px;
            display: flex;
            align-items: center;
            gap: 80px;
        }
        .item-visual { 
            flex: 1.2; 
            position: relative; 
            overflow: hidden; 
            background: #000;
            cursor: pointer;
        }
        .item-visual img { width: 100%; display: block; transition: 1.5s var(--ease-luxury); filter: brightness(0.8); }
        .item-visual:hover img { transform: scale(1.05); filter: brightness(1.0); }
        .item-info { flex: 0.8; padding: 0 30px; }
        .item-name { font-size: 2rem; margin-bottom: 20px; font-weight: 400; }
        .item-desc { color: var(--color-text-sub); font-size: 0.95rem; font-weight: 200; }

        /* 3 & 4. プロフィールとコンタクト */
        .container-sm { max-width: 800px; width: 100%; margin: 0 auto; padding: 0 40px; text-align: center; }
        .contact-card { background: var(--color-bg-layer); padding: 60px; border: 1px solid rgba(197, 160, 89, 0.1); }
        .form-input { 
            width: 100%; background: transparent; border: none; border-bottom: 1px solid #333; 
            padding: 15px 0; color: #fff; margin-bottom: 30px; font-family: var(--serif);
        }
        .form-input:focus { outline: none; border-bottom: 1px solid var(--color-gold); }
        .btn-send {
            padding: 15px 40px; border: 1px solid var(--color-gold); background: transparent;
            color: var(--color-gold); cursor: pointer; transition: 0.4s; letter-spacing: 0.3em;
        }
        .btn-send:hover { background: var(--color-gold); color: #000; }

        .sns-group { display: flex; justify-content: center; gap: 40px; margin-top: 40px; }
        .sns-link { color: var(--color-text-sub); text-decoration: none; font-size: 0.8rem; letter-spacing: 0.2em; transition: 0.3s; }
        .sns-link:hover { color: var(--color-gold); }

        /* フェードアニメーション */
        .reveal { opacity: 0; transform: translateY(30px); transition: 1.5s var(--ease-luxury); }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <a href="#home" class="logo">
                <span class="logo-jp">田中 凛</span>
                <span class="logo-en">RIN TANAKA</span>
            </a>
            <nav>
                <ul class="nav-list">
                    <li><a href="#home" class="nav-link">Home</a></li>
                    <li><a href="#gallery-section" class="nav-link">Gallery</a></li>
                    <li><a href="#vision" class="nav-link">Vision</a></li>
                    <li><a href="#contact" class="nav-link">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section id="home">
        <div class="hero-slider" id="heroSlider">
            <img src="001_2232.jpg" class="active" alt="">
            <img src="001_1943.jpg" alt="">
        </div>
        <div class="hero-overlay"></div>
        <div class="hero-content reveal">
            <h1 class="hero-title">光を聴き、<br>静寂を刻む。</h1>
            <p style="color: var(--color-gold); letter-spacing: 0.6em;">ECHOES OF MOMENTS</p>
        </div>
    </section>

    <div id="gallery-root"></div>

    <section id="vision" class="profile">
        <div class="container-sm reveal">
            <h2 style="font-size: 2.2rem; margin-bottom: 30px;">田中 凛</h2>
            <p style="margin-bottom: 40px; line-height: 2.5;">
                日常のノイズを削ぎ落とした先にある、本質的な静けさを追求しています。<br>
                Nikon Z 50IIと共に歩く時間は、世界との対話そのものです。
            </p>
            <div style="display: flex; justify-content: center; gap: 60px;">
                <div>
                    <p style="font-size: 0.6rem; color: var(--color-gold);">GEAR</p>
                    <p>Nikon Z 50II</p>
                </div>
                <div>
                    <p style="font-size: 0.6rem; color: var(--color-gold);">BASE</p>
                    <p>Tokyo/Chiba</p>
                </div>
            </div>
        </div>
    </section>

    <section id="contact">
        <div class="container-sm reveal">
            <div class="contact-card">
                <h3 style="margin-bottom: 40px; font-weight: 200; letter-spacing: 0.3em;">CONTACT</h3>
                <form action="https://formspree.io/f/maqplpnr" method="POST">
                    <input type="text" name="name" class="form-input" placeholder="Name" required>
                    <input type="email" name="email" class="form-input" placeholder="Email" required>
                    <textarea name="message" class="form-input" placeholder="Message" rows="4" required></textarea>
                    <button type="submit" class="btn-send">SEND MESSAGE</button>
                </form>

                <div class="sns-group">
                    <a href="https://www.instagram.com/7r11n_/" target="_blank" class="sns-link">INSTAGRAM</a>
                    <a href="https://x.com/cossrin" target="_blank" class="sns-link">X / TWITTER</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        /* ==========================================
           4. 簡単写真追加システム
           新しい写真を追加したいときは、以下の galleryData 配列に
           { src: "ファイル名", name: "作品名", desc: "説明" } を足すだけです。
        ========================================== */
        const galleryData = [
            {
                src: "001_2232.jpg",
                name: "静寂の淵",
                desc: "寺院の回廊に落ちる光は、目に見えない時間の粒子を可視化させます。"
            },
            {
                src: "001_1943.jpg",
                name: "都市の幾何学",
                desc: "無機質な鉄とガラスが交差する瞬間。都会の喧騒の中に現れる均衡。"
            }
            // ここに新しいオブジェクトを追加するだけでセクションが自動で増えます
        ];

        const galleryRoot = document.getElementById('gallery-root');
        galleryData.forEach((item, index) => {
            const section = document.createElement('section');
            section.id = `gallery-item-${index}`;
            section.innerHTML = `
                <div class="gallery-container">
                    <div class="item-visual reveal">
                        <img src="${item.src}" alt="${item.name}">
                    </div>
                    <div class="item-info reveal">
                        <span style="color: var(--color-gold); font-family: var(--accent); font-size: 0.8rem;">0${index + 1} / ARCHIVE</span>
                        <h3 class="item-name">${item.name}</h3>
                        <p class="item-desc">${item.desc}</p>
                    </div>
                </div>
            `;
            galleryRoot.appendChild(section);
        });

        /* ==========================================
           1. 背景スライド制御 (クロスフェード)
        ========================================== */
        const slides = document.querySelectorAll('#heroSlider img');
        let currentSlide = 0;

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }
        setInterval(nextSlide, 5000);

        /* ==========================================
           5. アニメーション制御
        ========================================== */
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.2 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
