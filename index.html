<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>田中 凛 | Rin Tanaka Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@200;400;600&family=Inter:wght@200;400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* --- デザイントークン (既存維持) --- */
        :root {
            --color-bg: #050505;
            --color-bg-layer: #0c0c0c;
            --color-gold: #c5a059;
            --color-ivory: #f2f2f2;
            --color-text-dim: #999999;
            --font-serif: "Noto Serif JP", serif;
            --font-accent: "Cinzel", serif;
            --font-sans: "Inter", "Hiragino Sans", sans-serif;
            --ease-luxury: cubic-bezier(0.22, 1, 0.36, 1);
            --header-h: 80px;
        }

        /* --- 基本レイアウト --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; scroll-snap-type: y mandatory; }
        body {
            background-color: var(--color-bg);
            color: var(--color-ivory);
            font-family: var(--font-serif);
            line-height: 1.8;
            letter-spacing: 0.1em;
            overflow-x: hidden;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        body.loaded { opacity: 1; }

        .screen {
            height: 100vh; width: 100%;
            scroll-snap-align: start; scroll-snap-stop: always;
            position: relative; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* --- Header --- */
        .header {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-h);
            z-index: 1000; display: flex; align-items: center; padding: 0 40px;
            transition: all 0.6s var(--ease-luxury);
        }
        .header.scrolled {
            height: 60px; background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(197, 160, 89, 0.15);
        }
        .header-inner { width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .logo { text-decoration: none; color: #fff; display: flex; flex-direction: column; }
        .logo-name { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.3em; line-height: 1.2; }
        .logo-sub { font-family: var(--font-accent); font-size: 0.5rem; color: var(--color-gold); letter-spacing: 0.4em; margin-top: 4px; }

        .nav-list { display: flex; list-style: none; gap: 25px; }
        .nav-link { 
            text-decoration: none; color: #fff; font-size: 0.65rem; font-family: var(--font-sans);
            letter-spacing: 0.15em; opacity: 0.4; transition: 0.4s; text-transform: uppercase;
        }
        .nav-link.active { opacity: 1; color: var(--color-gold); }

        /* --- Hero --- */
        .hero-slider { position: absolute; inset: 0; z-index: 1; }
        .hero-slider img {
            position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
            opacity: 0; transform: scale(1.08); transition: opacity 3s ease, transform 12s linear;
        }
        .hero-slider img.active { opacity: 0.4; transform: scale(1.0); }
        .hero-overlay { position: absolute; inset: 0; background: radial-gradient(circle, transparent 20%, #000 160%); z-index: 2; }
        
        .hero-content { position: relative; z-index: 3; text-align: center; padding: 0 20px; }
        .hero-label { font-family: var(--font-sans); font-size: 0.55rem; color: var(--color-gold); letter-spacing: 0.6em; margin-bottom: 20px; display: block; opacity: 0.8; }
        .hero-title { font-size: clamp(1.4rem, 8vw, 2.4rem); font-weight: 200; letter-spacing: 0.5em; line-height: 1.8; margin-bottom: 30px; }
        
        .hero-sns a { color: var(--color-ivory); text-decoration: none; font-size: 0.6rem; letter-spacing: 0.2em; display: inline-flex; align-items: center; gap: 8px; opacity: 0.6; transition: 0.4s; }

        /* --- Gallery Layout (スマホ最適化) --- */
        .gallery-container {
            width: 100%; max-width: 1300px; padding: 0 40px;
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 60px; align-items: center;
        }
        .gallery-item { display: flex; flex-direction: column; gap: 15px; position: relative; }
        .gallery-item:nth-child(even) { margin-top: 40px; } 

        .item-visual { 
            position: relative; overflow: hidden; background: #000; 
            cursor: pointer; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .item-visual img { width: 100%; display: block; transition: 1.5s var(--ease-luxury); filter: brightness(0.9); }
        .item-visual:hover img { transform: scale(1.03); filter: brightness(1); }
        
        .item-info { padding: 0 5px; }
        .item-num { font-family: var(--font-accent); color: var(--color-gold); font-size: 0.5rem; margin-bottom: 4px; display: block; opacity: 0.5; }
        .item-name { font-size: 0.95rem; font-weight: 400; letter-spacing: 0.15em; margin-bottom: 8px; }
        .item-desc { font-size: 0.7rem; color: var(--color-text-dim); font-weight: 200; line-height: 1.8; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* --- Modal (UX改善) --- */
        .modal {
            position: fixed; inset: 0; background: rgba(4,4,4,0.98); z-index: 2000;
            display: flex; opacity: 0; pointer-events: none; transition: 0.5s var(--ease-luxury);
        }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-inner { 
            position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px;
        }
        /* 改善②: 背景全体をクリック可能に */
        .modal-close-trigger { position: absolute; inset: 0; z-index: 2001; cursor: pointer; }
        
        .modal-img-wrap { 
            position: relative; z-index: 2002; max-width: 95%; max-height: 65vh; 
            display: flex; justify-content: center; cursor: pointer; /* 改善②: 画像タップで閉じる */
        }
        .modal-img { max-width: 100%; max-height: 65vh; object-fit: contain; transform: scale(0.97); opacity: 0; transition: 0.7s var(--ease-luxury); }
        .modal.active .modal-img { transform: scale(1); opacity: 1; }
        
        .modal-info { position: relative; z-index: 2002; text-align: center; margin-top: 30px; max-width: 500px; pointer-events: none; }
        .modal-title { font-size: 1.1rem; letter-spacing: 0.2em; margin-bottom: 12px; }
        .modal-desc { font-size: 0.8rem; color: var(--color-text-dim); margin-bottom: 15px; font-weight: 200; line-height: 2; }
        .modal-exif { font-family: var(--font-sans); font-size: 0.5rem; color: var(--color-gold); letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.5; }

        /* --- 固定Instagramボタン --- */
        .insta-fixed {
            position: fixed; bottom: 25px; right: 25px; z-index: 900;
            width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            color: var(--color-gold); border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 50%; text-decoration: none; transition: 0.4s;
            background: rgba(5, 5, 5, 0.6); backdrop-filter: blur(10px);
        }
        .insta-fixed:active { transform: scale(0.9); background: var(--color-gold); color: #000; }

        /* --- Vision & Contact --- */
        .profile-card { max-width: 600px; text-align: center; padding: 0 20px; }
        .profile-vision { font-size: 1rem; margin: 35px 0; line-height: 2.5; font-weight: 200; }
        .profile-meta { display: flex; justify-content: center; gap: 40px; margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 40px; }
        .meta-item dt { font-size: 0.5rem; color: var(--color-gold); letter-spacing: 0.3em; margin-bottom: 8px; }
        .meta-item dd { font-size: 0.85rem; font-weight: 200; }

        .btn-luxury { 
            width: 100%; padding: 18px; border: 1px solid rgba(197, 160, 89, 0.5); background: transparent; 
            color: var(--color-gold); cursor: pointer; transition: 0.4s; letter-spacing: 0.4em; font-family: var(--font-sans); font-size: 0.6rem;
        }

        /* --- Animations --- */
        .reveal { opacity: 0; transform: translateY(30px); transition: 1.5s var(--ease-luxury); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .delay-1 { transition-delay: 0.15s; }
        .delay-2 { transition-delay: 0.3s; }

        /* 🔥 必須改善①: スマホ最適化 (Mobile First Overrides) */
        @media screen and (max-width: 768px) {
            :root { --header-h: 65px; }
            
            .header { padding: 0 16px; }
            .logo-name { font-size: 1rem; }

            .screen { height: auto; min-height: 100vh; padding: 100px 0; }
            #home.screen { height: 85vh; padding: 0; } /* Heroの高さを少し抑える */

            .gallery-container { 
                grid-template-columns: 1fr; /* 1カラム化 */
                gap: 30px; 
                padding: 0 16px; /* 左右余白を16pxに縮小 */
            }
            .gallery-item:nth-child(even) { margin-top: 0; } /* ズレ演出の解除 */
            
            .item-visual { box-shadow: none; border-radius: 2px; }
            .item-name { font-size: 1.1rem; } /* スマホでの視認性向上 */
            .item-desc { -webkit-line-clamp: 3; font-size: 0.75rem; }

            .nav-list { gap: 15px; }
            .nav-link { font-size: 0.6rem; }

            .profile-vision { font-size: 0.9rem; line-height: 2.2; }
            .profile-meta { gap: 20px; flex-wrap: wrap; }
            
            .insta-fixed { bottom: 20px; right: 20px; }

            .modal-inner { padding: 16px; }
            .modal-info { margin-top: 20px; }
            .modal-title { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <a href="https://www.instagram.com/rin_tanaka23" target="_blank" rel="noopener noreferrer" class="insta-fixed" aria-label="Instagram">
        <i data-lucide="instagram" size="20"></i>
    </a>

    <header class="header" id="mainHeader">
        <div class="header-inner">
            <a href="#home" class="logo">
                <span class="logo-name">田中 凛</span>
                <span class="logo-sub">PHOTOGRAPHY BY RIN TANAKA</span>
            </a>
            <nav>
                <ul class="nav-list">
                    <li><a href="#gallery-0" class="nav-link" data-section="gallery">Gallery</a></li>
                    <li><a href="#vision" class="nav-link" data-section="vision">Vision</a></li>
                    <li><a href="#contact" class="nav-link" data-section="contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="home" class="screen" data-section="home">
            <div class="hero-slider" id="heroSlider"></div>
            <div class="hero-overlay"></div>
            <div class="hero-content reveal">
                <span class="hero-label">VISUAL ARCHIVE</span>
                <h1 class="hero-title">静寂を、<br>編む。</h1>
                <div class="hero-sns">
                    <a href="https://www.instagram.com/rin_tanaka23" target="_blank" rel="noopener noreferrer">
                        <i data-lucide="instagram" size="14"></i> FOLLOW ME
                    </a>
                </div>
            </div>
        </section>

        <div id="gallery-root"></div>

        <section id="vision" class="screen" data-section="vision">
            <div class="profile-card reveal">
                <p class="logo-sub" style="margin-bottom: 10px; opacity: 0.6;">Concept</p>
                <h2 style="font-size: 1.4rem; font-weight: 200; letter-spacing: 0.4em;">日常の断片</h2>
                <div class="profile-vision">
                    <p>通り過ぎてしまう光、<br>名前のない時間。</p>
                    <p style="color: var(--color-text-dim); font-size: 0.75rem; max-width: 400px; margin: 20px auto 0;">
                        目に見えるもの以上の空気感を、<br>一枚の静止画の中に閉じ込める。
                    </p>
                </div>
                <dl class="profile-meta">
                    <div class="meta-item"><dt>Artist</dt><dd>Rin Tanaka</dd></div>
                    <div class="meta-item"><dt>Location</dt><dd>Tokyo / Chiba</dd></div>
                    <div class="meta-item"><dt>Gear</dt><dd>Nikon Z Series</dd></div>
                </dl>
            </div>
        </section>

        <section id="contact" class="screen" data-section="contact">
            <div class="contact-box reveal" style="width: 100%; max-width: 400px; padding: 0 20px;">
                <h3 style="text-align: center; font-size: 1rem; margin-bottom: 40px; font-weight: 200; letter-spacing: 0.3em;">CONTACT</h3>
                <form action="https://formspree.io/f/maqplpnr" method="POST">
                    <div style="margin-bottom:20px;">
                        <input type="text" name="name" placeholder="NAME" class="btn-luxury" style="text-align:left; border:none; border-bottom:1px solid rgba(255,255,255,0.1); padding:12px 0; background:transparent; color:#fff; border-radius:0;" required>
                    </div>
                    <div style="margin-bottom:20px;">
                        <input type="email" name="email" placeholder="EMAIL" class="btn-luxury" style="text-align:left; border:none; border-bottom:1px solid rgba(255,255,255,0.1); padding:12px 0; background:transparent; color:#fff; border-radius:0;" required>
                    </div>
                    <div style="margin-bottom:35px;">
                        <textarea name="message" placeholder="MESSAGE" rows="3" class="btn-luxury" style="text-align:left; border:none; border-bottom:1px solid rgba(255,255,255,0.1); padding:12px 0; background:transparent; color:#fff; border-radius:0; resize:none;" required></textarea>
                    </div>
                    <button type="submit" class="btn-luxury" style="border: 1px solid var(--color-gold);">SEND INQUIRY</button>
                </form>
            </div>
        </section>
    </main>

    <div class="modal" id="galleryModal" role="dialog" aria-modal="true">
        <div class="modal-close-trigger" id="modalClose"></div>
        <div class="modal-inner">
            <div class="modal-img-wrap" id="modalImgWrap">
                <img src="" alt="" class="modal-img" id="modalImg">
            </div>
            <div class="modal-info">
                <h4 class="modal-title" id="modalTitle"></h4>
                <p class="modal-desc" id="modalDesc"></p>
                <p class="modal-exif" id="modalExif"></p>
            </div>
        </div>
    </div>

    <script>
        /**
         * 📸 写真データの管理ルール:
         * 1. DATA_CONFIG.photos にオブジェクトを追加するだけで反映されます。
         * 2. ファイル名は「001_xxxx.JPG」など、拡張子の大小文字をサーバー上の実ファイルと完全に一致させてください。
         * 3. 推奨画像サイズ: 長辺2000px程度 (将来的にWebP形式で書き出すとより高速になります)
         */
        const DATA_CONFIG = {
            heroImages: ["001_1923.jpg", "001_2232.jpg", "001_2199.jpg"],
            photos: [
                { src: "001_3622.jpg", name: "対話のほとり", desc: "水面に映る緑と、寄り添う白い影。静かな時間が流れる場所。", exif: "f/4.5 | 1/200s | ISO 400" },
                { src: "001_3603.jpg", name: "木漏れ日の記憶", desc: "苔むした石を撫でる光。森が呼吸する一瞬を切り取る。", exif: "f/2.8 | 1/500s | ISO 100" },
                { src: "001_3556.jpg", name: "燃ゆる影", desc: "重なり合う楓の葉。色彩の層が空気を重厚に染め上げる。", exif: "f/5.6 | 1/125s | ISO 200" },
                { src: "001_3547.jpg", name: "一輪の呼吸", desc: "鮮やかな紅が、淡い背景に浮き立つ。生命の輪郭。", exif: "f/1.8 | 1/1000s | ISO 100" },
                { src: "001_3467.jpg", name: "時の澱み", desc: "水草の中に佇む古い設備。自然と人工物が溶け合う瞬間。", exif: "f/8.0 | 1/60s | ISO 800" },
                { src: "001_3535.jpg", name: "標本の世界", desc: "静止した時間の中に閉じ込められた、自然の造形美。", exif: "f/4.0 | 1/160s | ISO 200" },
                { src: "001_2232.jpg", name: "境界の静寂", desc: "光と影が交差する、日常の中の非日常的な空間。", exif: "f/2.8 | 1/100s | ISO 400" },
                { src: "001_2199.jpg", name: "帰り道", desc: "日常の一コマを写真に。", exif: "f/5.6 | 1/250s | ISO 100" },
                { src: "001_1943.jpg", name: "現代アート", desc: "市街地に目立つ濃い色彩のアート作品。", exif: "f/2.0 | 1/800s | ISO 100" },
                { src: "001_1923.jpg", name: "光の粒子", desc: "空気に溶け込むような、柔らかな午後の光を捉えて。", exif: "f/1.8 | 1/2000s | ISO 100" },
                { src: "001_1887.jpg", name: "静かなる断片", desc: "足元に転がる、誰にも気づかれない美しさ。", exif: "f/4.0 | 1/60s | ISO 800" },
                { src: "001_1007.jpg", name: "兄弟", desc: "可愛さ目立つ街の一角。", exif: "f/8.0 | 1/125s | ISO 200" }
            ]
        };

        let currentPhotoIndex = 0;

        function initGallery() {
            const root = document.getElementById('gallery-root');
            const photos = DATA_CONFIG.photos;
            
            // PCでは2枚1組、スマホでは順次表示（CSSで制御）
            for (let i = 0; i < photos.length; i += 2) {
                const pair = photos.slice(i, i + 2);
                const screenId = `gallery-${Math.floor(i/2)}`;
                
                let pairHTML = '';
                pair.forEach((photo, idx) => {
                    const globalIdx = i + idx;
                    const delayClass = idx === 0 ? 'delay-1' : 'delay-2';
                    pairHTML += `
                        <div class="gallery-item">
                            <div class="item-visual reveal ${delayClass}" onclick="openModal(${globalIdx})">
                                <img src="${photo.src}" alt="${photo.name} - Rin Tanaka" loading="lazy">
                            </div>
                            <div class="item-info reveal ${delayClass}">
                                <span class="item-num">#${(globalIdx + 1).toString().padStart(3, '0')}</span>
                                <h3 class="item-name">${photo.name}</h3>
                                <p class="item-desc">${photo.desc}</p>
                            </div>
                        </div>
                    `;
                });

                root.innerHTML += `
                    <section id="${screenId}" class="screen" data-section="gallery">
                        <div class="gallery-container">${pairHTML}</div>
                    </section>
                `;
            }
        }

        const modal = document.getElementById('galleryModal');
        
        function updateModalContent(idx) {
            const data = DATA_CONFIG.photos[idx];
            const img = document.getElementById('modalImg');
            img.style.opacity = '0';
            
            setTimeout(() => {
                img.src = data.src;
                document.getElementById('modalTitle').textContent = data.name;
                document.getElementById('modalDesc').textContent = data.desc;
                document.getElementById('modalExif').textContent = data.exif;
                img.onload = () => { img.style.opacity = '1'; };
            }, 150);
        }

        function openModal(idx) {
            currentPhotoIndex = idx;
            updateModalContent(idx);
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // 改善②: キーボード操作 & 画像タップで閉じる
        window.addEventListener('keydown', (e) => {
            if (!modal.classList.contains('active')) return;
            if (e.key === 'Escape') closeModal();
            if (e.key === 'ArrowRight') {
                currentPhotoIndex = (currentPhotoIndex + 1) % DATA_CONFIG.photos.length;
                updateModalContent(currentPhotoIndex);
            }
            if (e.key === 'ArrowLeft') {
                currentPhotoIndex = (currentPhotoIndex - 1 + DATA_CONFIG.photos.length) % DATA_CONFIG.photos.length;
                updateModalContent(currentPhotoIndex);
            }
        });

        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalImgWrap').addEventListener('click', closeModal);

        function initObserver() {
            const navLinks = document.querySelectorAll('.nav-link');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
                        const section = entry.target.getAttribute('data-section');
                        navLinks.forEach(link => {
                            const linkSection = link.getAttribute('data-section');
                            link.classList.toggle('active', linkSection === section || (section === 'gallery' && linkSection === 'gallery'));
                        });
                        document.getElementById('mainHeader').classList.toggle('scrolled', window.scrollY > 50);
                    }
                });
            }, { threshold: 0.25 });
            document.querySelectorAll('section').forEach(sec => observer.observe(sec));
        }

        window.addEventListener('DOMContentLoaded', () => {
            const slider = document.getElementById('heroSlider');
            DATA_CONFIG.heroImages.forEach((src, i) => {
                const img = document.createElement('img');
                img.src = src;
                if(i===0) img.classList.add('active');
                slider.appendChild(img);
            });

            initGallery();
            initObserver();
            lucide.createIcons();
            setTimeout(() => { document.body.classList.add('loaded'); }, 100);
        });

        let currentHero = 0;
        setInterval(() => {
            const imgs = document.querySelectorAll('.hero-slider img');
            if(imgs.length > 0) {
                imgs[currentHero].classList.remove('active');
                currentHero = (currentHero + 1) % imgs.length;
                imgs[currentHero].classList.add('active');
            }
        }, 6000);
    </script>
</body>
</html>
